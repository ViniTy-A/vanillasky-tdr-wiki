  - Le concept: concept.md
  - Voyages dimensionnels: voyages-dimensionnels.md
  - Ton spawn: spawn.md
  - Commandes: commandes.md
  - Recettes custom:
      - recettes/index.md
      - Minerais (motif en croix): recettes/minerais.md
      - Armures de cheval: recettes/armures-cheval.md
      - Armures de nautile: recettes/armures-nautile.md
      - Baies lumineuses: recettes/baies-lumineuses.md
      - Haut fourneau: recettes/haut-fourneau.md
      - Modèle de forge Netherite: recettes/modele-forge-netherite.md
  - Mécaniques spéciales:
      - mecaniques/index.md
      - Mobs et passifs: mecaniques/mobs.md
      - Blocs et ressources: mecaniques/blocs.md
      - Chambres des épreuves: mecaniques/chambres-epreuves.md
      - Disques musicaux: mecaniques/disques.md
      - Drops spéciaux: mecaniques/drops.md
  - Tutoriels vidéo:
      - tutoriels/index.md
      - Pour débutants:
          - Descente Y=-64: tutoriels/descente-y-64.md
      - Mécaniques de base:
          - Druse d'améthyste: tutoriels/druse-amethyste.md
          - Blaze → Breeze: tutoriels/blaze-vers-breeze.md
          - Cœur de grinceur: tutoriels/coeur-grinceur.md
      - Chambres des épreuves:
          - Activation générateur: tutoriels/activation-generateur-epreuves.md
          - Conquérant de la foudre: tutoriels/conquerant-foudre.md
          - Maîtrise du flux: tutoriels/maitrise-flux.md
      - Farms et endgame:
          - Farm creeper-disques: tutoriels/farm-creeper-disques.md
          - Farm Warden: tutoriels/farm-warden.md
          - Farm de coraux: tutoriels/farm-corail.md
          - Œuf de renifleur: tutoriels/oeuf-renifleur.md
  - Setup client: setup-client.md
  - Stratégie d'exploration: strategie-exploration.md
  - Vocabulaire: vocabulaire.md
  - Roadmap: roadmap.md
